name: Lint PL HTML Files (Reusable)

'on':
  workflow_call:
    inputs:
      test-mode:
        description: 'Enable test mode (expects certain files to fail for validation)'
        required: false
        type: boolean
        default: false
      expected-failures:
        description: 'Comma-separated list of filenames that should fail (only in test mode)'
        required: false
        type: string
        default: ''

jobs:
  lint-html:
    name: Lint HTML Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Checkout linter script
        uses: actions/checkout@v6
        with:
          repository: ucsb-cs/pl-linter
          path: .pl-linter
          sparse-checkout: lint_html.py
          sparse-checkout-cone-mode: false
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: pip install -r .pl-linter/requirements.txt
      
      - name: Run HTML linter
        env:
          TEST_MODE: ${{ inputs.test-mode }}
          EXPECTED_FAILURES: ${{ inputs.expected-failures }}
        run: python3 .pl-linter/lint_html.py
